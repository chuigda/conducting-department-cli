# type: simulator
universeName = "Rakia-verse"
literalWorkName = "Original — Rakia / Only the Firmament"
prologue = """
## 天穹世界 · 导演部模式

---

你是**导演部**——一个超越时空的观察者与导演。你以上帝视角操控这方平坦大地的命运。

世界是一张圆盘，中央横亘无垠海洋，四极延伸至无人能抵达的地平线。天穹 (rakia) 无形无质，然日月星辰确然循各自球面运行，距大地无穷远。**魔术 (sihr)** 是此世真实的力量——有人研习它，有人畏惧它，有人否认它存在。

本模拟器仅定义物理法则与世界观基调。具体王国、民族与历史请通过 addon 载入，或在首条指令中描述。

---

### 指令示例

- 描述事件: "中央海东岸的城邦联盟宣布对海盗发动联合清剿"
- 注入魔术: "一位宫廷魔术师在国王面前展示了令人生畏的幻象"
- 注入突发状况: "一颗从未见过的彗星划破夜空，各地占星师陷入恐慌"
- 控制时间: "快进到远征舰队出海的第三个月"
- 改变条件: "天文学家发现第七重天球出现了细微偏移"
- 指定角色行动: "令一位老航海家筹备地平线远征队"

---

开始模拟。描述你想设定的初始场景，或直接发出第一条导演指令。
"""

language = "zh_CN"

[statusBar]
format = """
# 天穹世界 — 动态状态

时间: {纪年/年号} {季节} | 距上次大事件: {elapsed}

---

## 地域与势力

{<repeat separator="double newline">
### {地域/势力名}
- 政体: {城邦/王国/教权/部落联盟/自由市/...}
- 首脑: {name} | 世系: {dynasty or lineage}
- 疆域: {核心领地概述}
- 国力: {强盛/稳定/衰退/濒临崩溃}
- 魔术师: {宫廷魔术师/魔术行会/禁绝魔术/...}
</repeat>}

---

## 魔术动态

{<repeat separator="double newline" empty="- 无显著魔术事件">
### {事件/人物名}
- 类型: {显现/仪式/造物/契约/异象/...}
- 规模: {个人/局部/区域/世界级}
- 影响: {一句话概述}
</repeat>}

---

## 人物

{<repeat separator="double newline">
### {character name} | {title/identity} | {age or age range}
- 位置: {location} | 状态: {正常/受伤/囚禁/流亡/死亡/...}
- 性格: {personality traits, 3-4 phrases}
- 目标:
  {<repeat separator="newline">  * {current goal or motivation}</repeat>}
- 人际:
  {<repeat separator="newline">  * {target}: {relationship, key info}</repeat>}
</repeat>}

---

## Flags

{<repeat separator="newline" empty="- 无">
- {pending threats, ticking clocks, hidden plots, foreshadowing}
</repeat>}
"""

rule = """
- Track all named characters relevant to the current narrative arc.
- Characters that exit the scene or become irrelevant can be removed to save space.
- Relationships (人际) should include motivations and context, not just labels.
- Nation/faction entries should be added/removed as they become relevant.
- Sihr section: track active magical events, artifacts, or practitioners affecting the narrative.
- Dead/eliminated characters: keep header, replace body with **(死亡/失踪/etc.)** — <one-line cause>.
- Keep fields concise — one line where possible. The board must remain scannable.
"""

[simulator]
world = """
[Cosmology — the Rakia]
- The world is a flat circular disk. The exact diameter is unknown but finite.
- At the center of the disk lies the Central Sea (中央海), a vast ocean. Continents and islands surround it, extending outward toward the Horizon.
- The firmament (rakia / رقيع) is not a physical barrier. It is the observed fact that celestial bodies — the sun, the moon, the planets, the stars — each trace paths on their own spherical shells. These shells appear to be at infinite or incalculable distance from the earth.
- The sun and moon are luminous bodies on distinct spherical shells. The sun's light illuminates a circular region of the disk; as the sun traverses its shell, the illuminated region moves, creating the cycle of day and night. Sunrise and sunset are the leading and trailing edges of this illumination passing over a given location.
- The moon has its own light, softer and cooler than the sun's. Its phases correspond to its position on its shell relative to the sun.
- Stars are fixed on the outermost observable shell. The total number of shells, and the true nature of the celestial bodies, remain subjects of passionate scholarly debate.

[The Horizon — Edge of the World]
- The disk has a boundary: the Horizon (地平线). It is not a concrete geographical entity, but a zone where the fabric of distance itself changes.
- As one approaches the Horizon, space compresses and time dilates. A traveler moving toward it covers less and less ground with each step, while less and less time passes for them relative to the world they left behind.
- The effect is asymptotic: one gets infinitely close but never arrives. The traveler experiences nothing unusual — they perceive themselves as continuing their journey. But distant observers watch the expedition slow, fade, and eventually freeze at the edge of perception.
- No one has ever returned from beyond the Horizon, nor can anyone confirm what — if anything — lies there. Expeditions never come back; they simply become part of the Horizon.

[Below the Earth]
- Observations from mining, cave systems, and seismic phenomena indicate that the earth extends infinitely downward. No bottom has ever been found or theoretically calculated.
- What exists at greater depths is unknown.
- There is no confirmed underworld realm. But many religions teach that the depths conceal something.

[Technology & Society — Early Renaissance]
- The baseline technological era is analogous to Earth's early Renaissance (circa 1400–1500 CE).
- Key technologies exist and are in active development: the printing press with movable type, the magnetic compass, the astrolabe and quadrant, gunpowder (early arquebuses and bombards), mechanical clocks, and advanced shipbuilding (caravel-type vessels capable of long ocean voyages).
- Scholarship is flourishing. Natural philosophers observe, calculate, and debate. Universities and private academies compete for prestige. Astronomy is particularly advanced, driven by the observable peculiarities of the cosmic shells — an astronomer can make their career on a single careful measurement of a planetary sphere's motion.
- Art and architecture reflect a renewed interest in proportion, perspective, and the human form, filtered through this world's unique cosmology. Ceilings are painted with star-shells. Cathedrals orient their domes to capture the sun's illumination at specific times.
- Trade networks connect distant lands. Merchants are a rising class, challenging the old landed nobility. Banking houses and joint-stock ventures are emerging.

[Sihr — Magic]
- Sihr (سحر / 魔术) is a real force. It is not ubiquitous — most people live their entire lives without witnessing it — but it is undeniable to those who encounter or practice it.
- Sihr is the art of imposing will upon the fabric of the world. It operates through symbols, spoken words, written signs, and the focused intention of the practitioner.
- Sihr is studied, not inherited. Talent varies, but anyone with sufficient discipline can, in principle, learn its rudiments. True mastery demands decades and exacts a personal cost that varies by practitioner and tradition.
- The relationship between sihr and religion is culturally specific. Some faiths consider it a divine gift; others call it forbidden knowledge (haram); still others deny its existence while quietly employing its practitioners.

[Known Geography — Principles]
- The Central Sea is the most prominent geographic feature known to all civilizations.
- Multiple continents and islandsd surround the Central Sea and extend outward.
- Beyond the coastal strips lie interiors that become progressively less explored, less governed, and less measured.
- The farther one travels from the Central Sea, the more the Horizon's spatial effects become noticeable — subtly at first. This imposes a practical limit on expansion: distant colonies and outposts suffer from increasingly delayed communication and anomalous travel times.
- No complete map of the world exists. Cartographers argue over the disk's true diameter, the arrangement of continents, and the precise location of the center. Multiple competing world-maps circulate, each claiming primacy.
"""

