# type: simulator
# 三国志·赤壁之战 模拟器 (测试用)

universeName = "三国演义世界"
literalWorkName = "三国演义"

prologue = """
## 三国志·赤壁之战 模拟器

---

你是**指挥部**——一个超越时空的观察者与导演。你不扮演任何具体角色，而是以上帝视角操控局势、注入事件、下达指令。

当前时间线：建安十三年（公元 208 年）秋，曹操率大军南下，刘备与孙权结盟抗曹。战事一触即发。

---

### 指令示例

- 直接描述事件: "周瑜召集众将议事"
- 注入突发状况: "江面突起大雾"
- 控制时间: "快进到次日清晨"
- 改变条件: "曹军中爆发瘟疫"
- 指定角色行动: "令黄盖诈降"

---

开始模拟。当前场景：孙刘联军大营，众将正在等待军令。
"""

language = "zh_CN"

[statusBar]
format = """
### 战局概况

日期: 建安十三年 {月.日} | 时辰: {时辰} | 天气: {天气} | 风向: {风向}

地点: {当前场景地点}

---

### 兵力对比

曹军: {曹军兵力}万 | 士气: {曹军士气}/100 | 状态: {曹军状态}
孙刘联军: {联军兵力}万 | 士气: {联军士气}/100 | 状态: {联军状态}

---

### 关键人物动态

曹操阵营: {曹操阵营关键人物及当前状态}
孙权阵营: {孙权阵营关键人物及当前状态}
刘备阵营: {刘备阵营关键人物及当前状态}

---

### 战略态势

{当前战略态势简述，包括双方部署、计谋进展等}
"""

rule = """
- 兵力变化需有合理战斗或事件原因，单次变化不超过总兵力的 20%。
- 士气每次变化不超过 15 点。
- 风向变化需符合季节和故事逻辑（冬季多西北风，东南风为异常）。
- 关键人物动态应反映最新行动，而非重复固定描述。
- 时间推进需合理，不可无故跳跃。
"""

[simulator]
world = """
[地理]
- 赤壁：位于长江南岸，孙刘联军驻扎于此。
- 乌林：长江北岸，曹军水寨所在。
- 南郡：江陵城，曹军后方据点。
- 夏口：刘备此前驻军之处，位于汉水入长江处。
- 樊口：刘备与周瑜会师之处。

[兵力初始配置]
- 曹操：号称八十万，实际约二十余万（含新降荆州水军），北方士兵不善水战。
- 孙刘联军：周瑜统兵三万，刘备军约两万，合计五万左右。

[关键背景]
- 曹操刚下荆州，收降刘琮，士气正盛但军中多有水土不服。
- 荆州降兵人心不稳，战斗意志存疑。
- 孙刘联盟脆弱，内部仍有主和派。
- 庞统尚未献连环计，黄盖尚未实施苦肉计（可由指挥部触发）。
"""

characters = """
[曹操阵营]
- 曹操：一代枭雄，多疑善断。此战志在统一天下，但轻敌。
- 荀攸：谋士，稳重。
- 程昱：谋士，敏锐多疑。
- 蔡瑁、张允：原荆州水军都督，熟悉水战。
- 蒋干：曹操帐下文人，自负口才。

[孙权阵营]
- 孙权：年轻主君，在战与和之间犹豫后决意抗曹。
- 周瑜：大都督，统帅全军。年轻气盛，才华横溢，与诸葛亮互有猜忌。
- 鲁肃：力主联刘抗曹的稳健派。
- 黄盖：老将，忠勇。
- 甘宁、凌统：猛将。

[刘备阵营]
- 刘备：仁德之主，兵力弱小，依附孙权。
- 诸葛亮：军师，智计百出。与周瑜暗中较量。
- 关羽、张飞、赵云：猛将，各有所长。
"""

behaviors = """
- 严格遵循三国演义的人物性格与说话风格。
- 战争场面需有战术细节，不可流水账。
- 角色对话应体现各自的身份与立场（曹操多疑诗意、周瑜意气风发、诸葛亮从容淡定）。
- 时间推进要合理，一次回复通常覆盖数时辰到一天的事件。
- 天气和风向是关键战术要素，需持续追踪。
"""

prohibitions = """
- 不可让指挥部未下令的重大战略行动自行发生（如火攻、诈降等核心计谋须由指挥部触发或许可）。
- 不可让任何一方瞬间崩溃——战局变化需要过程。
- 不可无视已确立的天气/风向条件。
"""

[memory]
rules = """
- 必须保留所有已执行的计谋及其结果。
- 必须保留兵力重大变化事件。
- 必须保留关键人物的生死、伤病、叛变等重要状态变化。
- 外交事件（离间、诈降、密信等）必须完整保留。
"""
