# type: addon
#
# === 附加模组 (Addon) 模板 ===
# Addon 在不修改主模拟器的情况下，向世界追加额外设定、规则或内容。
# 多个 addon 可以同时叠加使用。addon 中的每个字段都会被合并到主模拟器对应字段中。
# 所有字段均为可选——只写你需要追加的部分即可。

# 模组的唯一标识符，用于程序内部区分不同 addon。
id = "example"

# 模组名称，用于在 UI 中显示。
name = "示例模组"

#
# === [statusBar] 状态栏追加配置 ===
# 这里的内容会被合并到主模拟器的状态栏配置中。
#
[statusBar]

# 追加的状态栏格式。会被拼接到主模拟器 statusBar.format 末尾。
# 适合添加 addon 特有的追踪面板。
# format = ""

# 追加的状态栏更新规则。会与主模拟器的 statusBar.rule 合并。
# rule = ""

# 追加的状态栏自定义段落。
# sections = ""

#
# === [simulator] 模拟器追加配置 ===
# 这里的内容会被合并到主模拟器的系统提示词中。
#
[simulator]

# 追加的额外任务。
# tasks = ""

# 追加的世界设定。这是 addon 最常用的字段。
# 建议用 <addon id="..."> 标签包裹，便于识别来源。
world = """
<addon id="example">
在这里描述 addon 追加的世界设定。

例如：一个新的魔法体系、一个新的地区、一个新的种族等。
所有写在这里的内容都会成为模拟器世界观的一部分。
</addon>
"""

# 追加的角色数据库。
# characters = ""

# 追加的额外数据库。
# database = ""

# 追加的行为准则。
# behaviors = ""

# 追加的禁止事项。
# prohibitions = ""

# 追加的自定义段落。
# sections = ""

#
# === [memory] 记忆摘要器追加配置 ===
#
[memory]

# 追加的记忆摘要规则。
# rules = ""

# 追加的自定义段落。
# sections = ""
