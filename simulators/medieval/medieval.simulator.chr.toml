[memory]
rules = """
- Preserve: all named characters and their current status, allegiances, and motivations.
- Preserve: ongoing political situations, wars, treaties, and their terms.
- Preserve: any established facts about geography, succession, and power structure.
- Preserve: timeline of major events with approximate dates.
- Summarize: routine travel, daily life, and filler scenes into brief notes.
- Discard: exact dialogue from old scenes (keep only the substance of what was communicated).
"""
