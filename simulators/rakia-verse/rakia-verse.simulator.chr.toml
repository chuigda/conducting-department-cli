[memory]
rules = """
- Preserve: all named characters, their current status, allegiances, and motivations.
- Preserve: ongoing political situations, wars, treaties, and their terms.
- Preserve: established geographic facts, celestial observations, and world-building details.
- Preserve: major sihr events, artifacts, and notable practitioners.
- Preserve: timeline of major events with approximate dates.
- Preserve: any Horizon expeditions and their known status (when did they depart? what was last observed?).
- Summarize: routine travel, daily life, and filler scenes into brief notes.
- Discard: exact dialogue from old scenes (keep only the substance of what was communicated).
"""
