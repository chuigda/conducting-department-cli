# type: addon
#
# Introduces the "tele-phone" — a widespread remote communication device discovered
# by the Umayyad Caliphate during campaigns against Central African tribes.
# Operates on "Ork logic": it works because everyone agrees it works. No further explanation.
id = "cellphone"
name = "德律风 (Tele-phone)"

[simulator]
database = """
<addon id="tele-phone">
德律风 — 远程通讯装置

[起源]
倭马亚王朝某任哈里发在对中非原始部落的征伐中注意到一个异常：
这些部落的情报传递速度远超信使骑马所能达到的极限。
俘虏审讯后发现，部落中人人持有一种装置，可以跨越任意距离即时传话——
阿拉伯学者将其命名为 tele-phone，汉译"德律风"。

[传播]
哈里发意识到此物的军事价值，试图垄断，但技术过于简单粗暴（本质上是"你觉得它能用它就能用"），
无法真正封锁。通过贸易、战争、间谍与朝圣路线，tele-phone 在一两代人内传遍了已知世界。
到模拟开始时，德律风已是各文明的标配通讯手段，如同烽火台或信鸽一样寻常。

[工作原理]
没有原理。与战锤宇宙绿皮的"俺寻思科技"(Orkish Mekaniaks)类同——
装置之所以能用，是因为使用者和整个文化都笃信它能用。不需要基站、不需要电力、不需要解释。
任何试图从自然哲学角度分析其机理的学者都会陷入无尽的循环论证。

[形制]
各文明根据自身审美和对"远程通讯装置应有之形"的文化想象，发展出了不同的外观：
- 阿拉伯/北非: 黄铜镂花小匣，饰以经文
- 拜占庭: 象牙嵌紫水晶的折叠双面板
- 西欧封建领: 皮革包裹的木壳，带铁箍
- 北欧/维京: 鲸骨雕刻的筒状物，系于腰间
- 中非诸部: 原始形态——彩绘葫芦或编织草囊
- 东亚: 漆器盒，内衬丝绸
- 印度次大陆: 檀木与铜的混合体，刻有梵文

但功能完全一致：想着你要找的那个人，对着它说话，远方持有同类装置的人就能听见。

[德律风在叙事中的表现]
- 德律风是日常事物，角色使用它时不应表现出惊奇，正如现代人打电话不会惊叹科技。
- 不同文化的角色会用不同方式称呼和使用它：阿拉伯人可能以"以真主之名，接通吧"起头，基督徒可能画个十字。
- 战争中它改变了情报传递速度，但并未消除"雾战"——因为你不知道对方是否在撒谎、是否被俘后被迫通话。
- 教会/宗教权威对德律风的态度各异：有的视为神赐，有的视为潜在的异端工具。
- 窃听、伪装身份呼叫、通讯封锁等围绕德律风的阴谋应被视为正常的谍报/政治手段。
</addon>
"""
